<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attractor — Generative Art</title>
  <meta name="description" content="Attractor: padrão de arte generativa baseado em sobreposição aditiva de curvas tracejadas com colorização via LUT.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../common/css/base.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
</head>
<body>

  <!-- Canvas -->
  <div id="canvas-wrapper">
    <div id="loading">Gerando...</div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div class="control-group">
      <label for="paletteSelect">LUT</label>
      <select id="paletteSelect">
        <option value="neon">Neon</option>
        <option value="fire">Solar</option>
        <option value="ocean">Oceano</option>
        <option value="gold">Dourado</option>
        <option value="mono">Mono</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label for="stackSlider">
        Camadas
        <span id="stackValue">15</span>
      </label>
      <input type="range" id="stackSlider" min="5" max="35" value="15">
    </div>

    <div class="divider"></div>

    <button id="btn-generate" title="Gerar nova composição">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>

    <button id="btn-save" title="Salvar imagem HD">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
  </div>

  <!-- Info -->
  <div id="info">
    <span class="title">Attractor</span>
    <span class="credit">Baseado em Chris Mccully</span>
  </div>

  <script type="module" src="sketch.js"></script>

</body>
</html>
